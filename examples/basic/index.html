<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airpoint Basic Example</title>
  </head>
  <body>
    <canvas id="stage" aria-label="Airpoint cursor canvas"></canvas>
    <video id="airpoint-video" playsinline muted></video>
    <button id="click-target" type="button">Click me</button>
    <div id="tracking-label" aria-hidden="true">
      <span id="tracking-label-text">Start tracking</span>
      <span class="tracking-label-arrow"></span>
    </div>
    <button id="toggle" type="button" aria-label="Start tracking"></button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
